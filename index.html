<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MSD v8.0 | Triad Topology</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="msd-container">
        <aside class="service-fleet">
            <div class="panel-header">LOGICAL SERVICES (FLEET)</div>
            <div class="hex-grid" id="service-grid">
                </div>
        </aside>

        <main class="topology-viewer">
            <header class="viewer-header">
                <div>
                    <h1 id="view-title">AWAITING SERVICE SELECTION</h1>
                    <h2 id="view-subtitle">TRIAD QUORUM STATUS: --</h2>
                </div>
                <div class="latency-legend">
                    <span class="legend-item"><div class="dot fast"></div> <50ms</span>
                    <span class="legend-item"><div class="dot slow"></div> >200ms</span>
                    <span class="legend-item"><div class="dot drop"></div> FAULT</span>
                </div>
            </header>

            <div class="map-container">
                <div class="map-underlay"></div>
                <svg id="topology-layer" viewBox="0 0 1000 500" preserveAspectRatio="xMidYMid slice">
                    <g id="layer-quorum-links"></g>
                    <g id="layer-client-links"></g>
                    <g id="layer-nodes"></g>
                </svg>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
